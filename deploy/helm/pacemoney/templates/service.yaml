apiVersion: v1
kind: Service
metadata:
  name: {{ include "pacemoney.fullname" . }}
  labels:
    {{- include "pacemoney.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "pacemoney.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.app.port }}
      protocol: TCP
