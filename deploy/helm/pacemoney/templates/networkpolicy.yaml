apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pacemoney.fullname" . }}
  labels:
    {{- include "pacemoney.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pacemoney.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.app.port }}
