<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pace Money</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-symbol">£</span>
        <span class="logo-text">Pace Money</span>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="top-grid">

      <section class="card">
        <h2 class="card-title">Summary</h2>
        <div id="summary"></div>
      </section>

      <section class="card">
        <h2 class="card-title">Add Expense</h2>
        <form id="add-form" novalidate>
          <div class="field">
            <label for="amount">Amount (£)</label>
            <input id="amount" type="number" step="0.01" min="0.01" placeholder="0.00" required>
          </div>
          <div class="field">
            <label for="description">Description</label>
            <input id="description" type="text" placeholder="e.g. Weekly shop" required>
          </div>
          <div class="field">
            <label for="category">Category</label>
            <input id="category" type="text" list="category-list" placeholder="e.g. food" required>
            <datalist id="category-list">
              <option value="food">
              <option value="transport">
              <option value="housing">
              <option value="utilities">
              <option value="entertainment">
              <option value="health">
              <option value="clothing">
              <option value="other">
            </datalist>
          </div>
          <p id="form-error" class="form-error hidden"></p>
          <button type="submit" class="btn">Add Expense</button>
        </form>
      </section>

    </div>

    <section class="card">
      <h2 class="card-title">Transactions</h2>
      <div id="transactions"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
